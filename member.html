<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login</title>

  <style>
    body{
      background:#050816;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#111827;
      padding:40px;
      border-radius:20px;
      width:300px;
      text-align:center;
    }

    input{
      width:100%;
      padding:14px;
      margin-top:20px;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:20px;
      border:none;
      border-radius:10px;
      background:#00ffae;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Member Area</h1>

  <input type="password" id="password" placeholder="Masukkan Password">

  <button onclick="login()">Masuk</button>
</div>

<script>
function login(){

  const pass = document.getElementById('password').value;

  if(pass === "VIP2026"){
    window.location.href = "dashboard.html";
  } else {
    alert("Password salah!");
  }

}
</script>

</body>
</html>
